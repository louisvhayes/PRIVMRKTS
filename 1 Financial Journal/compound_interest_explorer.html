<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound Interest Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; padding: 2rem; max-width: 700px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .control { background: #f5f5f3; border-radius: 8px; padding: 12px 16px; }
  .ci-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .ci-value { font-size: 18px; font-weight: 500; color: #1a1a1a; margin-bottom: 8px; }
  input[type=range] { width: 100%; accent-color: #378ADD; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: #f5f5f3; border-radius: 8px; padding: 12px 14px; }
  .metric-label { font-size: 11px; color: #666; margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 500; }
  .blue { color: #378ADD; }
  .green { color: #1D9E75; }
  .amber { color: #BA7517; }
  .formula { background: #f5f5f3; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #666; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .formula span { color: #1a1a1a; font-weight: 500; }
  .legend { display: flex; gap: 16px; margin-top: 10px; font-size: 12px; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  @media (max-width: 480px) { .controls { grid-template-columns: 1fr; } .metrics { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<h1>Compound interest explorer</h1>

<div class="controls">
  <div class="control">
    <div class="ci-label">Initial investment</div>
    <div class="ci-value" id="principal-out">£1,000</div>
    <input type="range" min="100" max="10000" step="100" value="1000" id="principal">
  </div>
  <div class="control">
    <div class="ci-label">Annual interest rate</div>
    <div class="ci-value" id="rate-out">7%</div>
    <input type="range" min="1" max="20" step="1" value="7" id="rate">
  </div>
  <div class="control">
    <div class="ci-label">Time period</div>
    <div class="ci-value" id="years-out">20 years</div>
    <input type="range" min="1" max="50" step="1" value="20" id="years">
  </div>
  <div class="control">
    <div class="ci-label">Compound frequency</div>
    <div class="ci-value" id="freq-out">Yearly</div>
    <input type="range" min="1" max="12" step="1" value="1" id="freq">
  </div>
</div>

<div class="formula">
  A = P(1 + r/n)<sup>nt</sup> &nbsp;→&nbsp;
  <span id="formula-text">1000 × (1 + 0.07/1)^(1×20)</span>
</div>

<div class="metrics">
  <div class="metric">
    <div class="metric-label">Final value</div>
    <div class="metric-value blue" id="final-val">£3,870</div>
  </div>
  <div class="metric">
    <div class="metric-label">Total interest</div>
    <div class="metric-value green" id="interest-val">£2,870</div>
  </div>
  <div class="metric">
    <div class="metric-label">Growth</div>
    <div class="metric-value amber" id="growth-val">287%</div>
  </div>
</div>

<div style="position: relative; width: 100%; height: 260px;">
  <canvas id="ciChart"></canvas>
</div>

<div class="legend">
  <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:#378ADD"></span>Total value</span>
  <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:#d0e6f7"></span>Interest earned</span>
  <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:#B5D4F4"></span>Principal</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const fmtGBP = v => '£' + Math.round(v).toLocaleString('en-GB');
const freqLabels = {1:'Yearly',2:'Half-yearly',4:'Quarterly',12:'Monthly',3:'Every 4 months',6:'Every 2 months',5:'Every ~2.4mo',7:'Every ~7wk',8:'Every 6.5wk',9:'Every ~6wk',10:'Every ~5wk',11:'Every ~5.5wk'};
function getFreqLabel(n) { return freqLabels[n] || `${n}x per year`; }

let chart;

function calc() {
  const P = +document.getElementById('principal').value;
  const r = +document.getElementById('rate').value / 100;
  const t = +document.getElementById('years').value;
  const n = +document.getElementById('freq').value;

  document.getElementById('principal-out').textContent = fmtGBP(P);
  document.getElementById('rate-out').textContent = (+document.getElementById('rate').value) + '%';
  document.getElementById('years-out').textContent = t + (t===1?' year':' years');
  document.getElementById('freq-out').textContent = getFreqLabel(n);

  const rn = (r/n).toFixed(4);
  document.getElementById('formula-text').textContent = `${P} × (1 + ${rn})^(${n}×${t})`;

  const labels = [], principals = [], interests = [];
  for (let y = 0; y <= t; y++) {
    const A = P * Math.pow(1 + r/n, n*y);
    labels.push(y === 0 ? 'Start' : `Yr ${y}`);
    principals.push(Math.round(P));
    interests.push(Math.round(A - P));
  }

  const finalA = P * Math.pow(1 + r/n, n*t);
  document.getElementById('final-val').textContent = fmtGBP(finalA);
  document.getElementById('interest-val').textContent = fmtGBP(finalA - P);
  document.getElementById('growth-val').textContent = Math.round((finalA/P - 1)*100) + '%';

  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = interests;
    chart.data.datasets[1].data = principals;
    chart.update();
  } else {
    chart = new Chart(document.getElementById('ciChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Interest earned', data: interests, backgroundColor: '#d0e6f7', stack: 'a' },
          { label: 'Principal', data: principals, backgroundColor: '#378ADD', stack: 'a' }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => ' ' + fmtGBP(ctx.raw) }
        }},
        scales: {
          x: { stacked: true, ticks: { autoSkip: true, maxTicksLimit: 10 }, grid: { display: false } },
          y: { stacked: true, ticks: { callback: v => '£' + (v>=1000 ? (v/1000).toFixed(0)+'k' : v) } }
        }
      }
    });
  }
}

['principal','rate','years','freq'].forEach(id => {
  document.getElementById(id).addEventListener('input', calc);
});

calc();
</script>
</body>
</html>
