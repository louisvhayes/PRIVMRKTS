<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIVATE MARKETS JOURNAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --off-black: #111111;
  --panel: #161616;
  --panel-2: #1e1e1e;
  --border: #2a2a2a;
  --border-light: #333;
  --orange: #ff6600;
  --orange-dim: #cc5200;
  --orange-glow: rgba(255,102,0,0.15);
  --white: #f5f5f0;
  --white-dim: #c8c8c0;
  --white-muted: #888880;
  --green: #00d084;
  --red: #ff4444;
  --blue: #4499ff;
  --yellow: #ffcc00;
  --purple: #9966ff;
  --teal: #00cccc;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --serif: 'Playfair Display', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--black);
  color: var(--white);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* TICKER BAR */
.ticker-wrap {
  background: var(--orange);
  overflow: hidden;
  height: 28px;
  display: flex;
  align-items: center;
}
.ticker-label {
  background: var(--black);
  color: var(--orange);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  padding: 0 14px;
  height: 100%;
  display: flex;
  align-items: center;
  white-space: nowrap;
  flex-shrink: 0;
  z-index: 1;
}
.ticker-scroll {
  display: flex;
  animation: ticker 40s linear infinite;
  white-space: nowrap;
}
.ticker-item {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--black);
  padding: 0 24px;
  letter-spacing: 0.04em;
}
.ticker-item .change { opacity: 0.75; margin-left: 4px; }
@keyframes ticker {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* MASTHEAD */
.masthead {
  background: var(--off-black);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  height: 64px;
}
.masthead-left {
  display: flex;
  align-items: center;
  gap: 0;
}
.logo {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 900;
  color: var(--white);
  letter-spacing: -0.02em;
  padding-right: 20px;
  border-right: 1px solid var(--border);
  line-height: 1;
}
.logo span { color: var(--orange); }
.masthead-tag {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--white-muted);
  text-transform: uppercase;
  padding-left: 20px;
}
.masthead-right {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.timestamp {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--white-muted);
  letter-spacing: 0.04em;
}
.linkedin-link {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--white-muted);
  text-decoration: none;
  padding: 6px 12px;
  border: 1px solid var(--border-light);
  transition: all 0.15s;
}

.linkedin-link:hover {
  color: var(--orange);
  border-color: var(--orange);
}

.linkedin-icon {
  width: 14px;
  height: 14px;
  fill: var(--white-muted);
  transition: fill 0.15s;
}

.linkedin-link:hover .linkedin-icon {
  fill: var(--orange);
}
.btn-add {
  background: var(--orange);
  color: var(--black);
  border: none;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 8px 16px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.15s;
}
.btn-add:hover { background: #ff8533; }

/* NAV */
.nav {
  background: var(--panel);
  border-bottom: 2px solid var(--orange);
  padding: 0 2rem;
  display: flex;
  align-items: stretch;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nav-item {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--white-muted);
  padding: 0 18px;
  height: 40px;
  display: flex;
  align-items: center;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  white-space: nowrap;
  transition: color 0.15s;
  border-right: 1px solid var(--border);
}
.nav-item:hover { color: var(--white); }
.nav-item.active {
  color: var(--orange);
  border-bottom-color: var(--orange);
}
.nav-count {
  background: var(--border-light);
  color: var(--white-muted);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  margin-left: 6px;
  font-weight: 600;
}
.nav-item.active .nav-count {
  background: var(--orange-glow);
  color: var(--orange);
}

/* MAIN LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 0;
  min-height: calc(100vh - 132px);
}

/* FEED */
.feed {
  padding: 1.5rem 2rem;
  border-right: 1px solid var(--border);
}
.feed-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 1.25rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}
.feed-title {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--white-muted);
}
.feed-title .accent { color: var(--orange); }
.sort-bar {
  display: flex;
  gap: 12px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--white-muted);
  letter-spacing: 0.06em;
}
.sort-btn { cursor: pointer; transition: color 0.15s; }
.sort-btn.active { color: var(--orange); }
.sort-btn:hover { color: var(--white); }

/* CARDS */
.card-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
}
.card {
  background: var(--off-black);
  padding: 1.25rem;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  overflow: hidden;
}
.card:hover { background: var(--panel); }
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--card-accent, var(--orange));
  opacity: 0;
  transition: opacity 0.15s;
}
.card:hover::before { opacity: 1; }
.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 0.5rem;
}
.card-category {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 1px;
}
.card-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--white-muted);
}
.card-title {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  line-height: 1.35;
  margin-bottom: 0.4rem;
}
.card-desc {
  font-size: 12px;
  color: var(--white-dim);
  line-height: 1.5;
  margin-bottom: 0.75rem;
}
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-tags {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.tag {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--white-muted);
  background: var(--panel-2);
  border: 1px solid var(--border-light);
  padding: 2px 6px;
  letter-spacing: 0.06em;
}
.card-open {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--orange);
  letter-spacing: 0.08em;
  text-decoration: none;
  transition: color 0.15s;
}
.card-open:hover { color: #ff8533; }
.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 0.5rem;
}
.btn-sm {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.06em;
  padding: 3px 8px;
  border: 1px solid var(--border-light);
  background: transparent;
  color: var(--white-muted);
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
.btn-sm:hover { border-color: var(--orange); color: var(--orange); }
.btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

.empty-state {
  grid-column: 1 / -1;
  padding: 4rem 2rem;
  text-align: center;
}
.empty-icon {
  font-family: var(--mono);
  font-size: 32px;
  color: var(--border-light);
  margin-bottom: 1rem;
}
.empty-title {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--white-dim);
  margin-bottom: 0.5rem;
}
.empty-sub {
  font-family: var(--sans);
  font-size: 13px;
  color: var(--white-muted);
}

/* SIDEBAR */
.sidebar {
  padding: 1.5rem;
}
.sidebar-block {
  margin-bottom: 2rem;
}
.sidebar-heading {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--white-muted);
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.75rem;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.stat-label {
  font-family: var(--sans);
  font-size: 12px;
  color: var(--white-dim);
}
.stat-val {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--orange);
}
.cat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.cat-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cat-name {
  font-family: var(--sans);
  font-size: 12px;
  color: var(--white-dim);
  flex: 1;
}
.cat-n {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--white-muted);
}
.cat-bar-wrap {
  width: 60px; height: 3px;
  background: var(--panel-2);
  border-radius: 2px;
  overflow: hidden;
}
.cat-bar { height: 100%; border-radius: 2px; }

.recent-item {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.recent-item:hover .recent-title { color: var(--orange); }
.recent-title {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--white-dim);
  line-height: 1.4;
  margin-bottom: 2px;
  transition: color 0.15s;
}
.recent-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--white-muted);
}

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--panel);
  border: 1px solid var(--border-light);
  width: 560px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header {
  background: var(--off-black);
  border-bottom: 2px solid var(--orange);
  padding: 1rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-title {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white);
}
.modal-close {
  background: none; border: none;
  color: var(--white-muted);
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  padding: 0;
}
.modal-close:hover { color: var(--white); }
.modal-body { padding: 1.5rem; }
.form-group { margin-bottom: 1.25rem; }
.form-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--white-muted);
  display: block;
  margin-bottom: 6px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--off-black);
  border: 1px solid var(--border-light);
  color: var(--white);
  font-family: var(--sans);
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.15s;
  appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--orange);
}
.form-textarea { height: 80px; resize: vertical; }
.form-select option { background: var(--panel); }
.tag-input-wrap {
  display: flex; gap: 8px; flex-wrap: wrap;
  background: var(--off-black);
  border: 1px solid var(--border-light);
  padding: 8px;
  min-height: 42px;
  align-items: center;
}
.tag-input-wrap:focus-within { border-color: var(--orange); }
.tag-pill {
  display: flex; align-items: center; gap: 4px;
  background: var(--panel-2);
  border: 1px solid var(--border-light);
  padding: 3px 8px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--white-dim);
}
.tag-pill button {
  background: none; border: none; color: var(--white-muted);
  cursor: pointer; font-size: 12px; line-height: 1; padding: 0;
}
.tag-input {
  background: none; border: none; outline: none;
  color: var(--white); font-family: var(--mono); font-size: 11px;
  min-width: 80px; flex: 1;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.modal-footer {
  padding: 1rem 1.5rem;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.btn-cancel {
  background: none;
  border: 1px solid var(--border-light);
  color: var(--white-muted);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 18px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-cancel:hover { border-color: var(--white-muted); color: var(--white); }
.btn-save {
  background: var(--orange);
  border: none;
  color: var(--black);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 24px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-save:hover { background: #ff8533; }

/* Category color theme */
.cat-pe    { --cat-color: #ff6600; }
.cat-macro { --cat-color: #4499ff; }
.cat-credit { --cat-color: #00d084; }
.cat-re    { --cat-color: #9966ff; }
.cat-infra { --cat-color: #ffcc00; }
.cat-hedge { --cat-color: #00cccc; }
.cat-vc    { --cat-color: #ff4499; }
.cat-debt  { --cat-color: #ff9933; }

.flash { animation: flash 0.6s ease; }
@keyframes flash {
  0% { background: var(--orange-glow); }
  100% { background: transparent; }
}

/* ── DETAIL VIEW ── */
.detail-view {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--black);
  flex-direction: column;
  animation: slideIn 0.28s cubic-bezier(0.22, 1, 0.36, 1);
}
.detail-view.open { display: flex; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(32px); }
  to   { opacity: 1; transform: translateX(0); }
}
.detail-topbar {
  background: var(--off-black);
  border-bottom: 1px solid var(--border);
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  gap: 0;
  flex-shrink: 0;
}
.detail-back {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--orange);
  cursor: pointer;
  padding-right: 20px;
  border-right: 1px solid var(--border);
  height: 100%;
  transition: color 0.15s;
  background: none;
  border-top: none;
  border-bottom: none;
  border-left: none;
}
.detail-back:hover { color: #ff8533; }
.detail-back svg { width: 14px; height: 14px; flex-shrink: 0; }
.detail-breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-left: 20px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--white-muted);
  letter-spacing: 0.06em;
  flex: 1;
  min-width: 0;
  overflow: hidden;
}
.detail-breadcrumb .crumb-sep { color: var(--border-light); }
.detail-breadcrumb .crumb-title {
  color: var(--white-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.detail-topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
  flex-shrink: 0;
}
.detail-ext-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--white-muted);
  background: none;
  border: 1px solid var(--border-light);
  padding: 5px 12px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}
.detail-ext-btn:hover { border-color: var(--orange); color: var(--orange); }
.detail-ext-btn svg { width: 11px; height: 11px; }

/* detail meta strip */
.detail-meta-strip {
  background: var(--panel);
  border-bottom: 2px solid var(--orange);
  padding: 0 1.5rem;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.detail-meta-strip::-webkit-scrollbar { display: none; }
.meta-chip {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--white-muted);
  padding-right: 20px;
  margin-right: 20px;
  border-right: 1px solid var(--border);
  white-space: nowrap;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.meta-chip:last-child { border-right: none; }
.meta-chip strong { color: var(--white-dim); font-weight: 500; }
.meta-chip .cat-badge {
  display: inline-block;
  padding: 1px 7px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* iframe container */
.detail-frame-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.detail-iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  background: var(--off-black);
}
.detail-no-link {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 1rem;
}
.detail-no-link .icon {
  font-family: var(--mono);
  font-size: 48px;
  color: var(--border-light);
}
.detail-no-link h3 {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 700;
  color: var(--white-dim);
}
.detail-no-link p {
  font-size: 13px;
  color: var(--white-muted);
  max-width: 340px;
  text-align: center;
  line-height: 1.6;
}
.detail-no-link .btn-add-link {
  margin-top: 0.5rem;
  background: none;
  border: 1px solid var(--orange);
  color: var(--orange);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 20px;
  cursor: pointer;
  transition: all 0.15s;
}
.detail-no-link .btn-add-link:hover { background: var(--orange-glow); }

/* card click hint */
.card-click-hint {
  position: absolute;
  inset: 0;
  cursor: pointer;
  z-index: 0;
}
.card > *:not(.card-click-hint) { position: relative; z-index: 1; }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { border-top: 1px solid var(--border); }
  .card-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-label">LIVE</div>
  <div style="overflow:hidden;flex:1;">
    <div class="ticker-scroll" id="tickerScroll"></div>
  </div>
</div>

<!-- MASTHEAD -->
<div class="masthead">
  <div class="masthead-left">
    <div class="logo">PRIV<span>●</span>MRKTS</div>
    <div class="masthead-tag">Research & Analysis Journal</div>
  </div>
  <div class="masthead-right">
    <a class="linkedin-link" href="https://linkedin.com/in/louisvohayes" target="_blank" rel="noopener noreferrer">
  <svg class="linkedin-icon" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M4.98 3.5C4.98 4.88 3.87 6 2.49 6S0 4.88 0 3.5 1.11 1 2.49 1s2.49 1.12 2.49 2.5zM.22 8.09h4.54V24H.22zM8.56 8.09h4.35v2.17h.06c.61-1.15 2.09-2.36 4.3-2.36 4.6 0 5.45 3.03 5.45 6.97V24h-4.54v-7.76c0-1.85-.03-4.23-2.58-4.23-2.59 0-2.99 2.02-2.99 4.1V24H8.56z"/>
  </svg>
  LinkedIn
</a>
    <div class="timestamp" id="clock">--:-- GMT</div>
    <button class="btn-add" onclick="openProtectedModal()">+ ADD ENTRY</button>
  </div>
</div>

<!-- NAV -->
<nav class="nav" id="mainNav"></nav>

<!-- LAYOUT -->
<div class="layout">
  <main class="feed">
    <div class="feed-header">
      <div class="feed-title"><span class="accent" id="feedLabel">ALL SECTORS</span> — RESEARCH ENTRIES</div>
      <div class="sort-bar">
        <span class="sort-btn active" onclick="setSort('date', this)">DATE</span>
        <span class="sort-btn" onclick="setSort('alpha', this)">A–Z</span>
        <span class="sort-btn" onclick="setSort('cat', this)">CATEGORY</span>
      </div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </main>

  <aside class="sidebar">
    <div class="sidebar-block">
      <div class="sidebar-heading">Portfolio Stats</div>
      <div class="stat-row"><span class="stat-label">Total entries</span><span class="stat-val" id="statTotal">0</span></div>
      <div class="stat-row"><span class="stat-label">Categories covered</span><span class="stat-val" id="statCats">0</span></div>
      <div class="stat-row"><span class="stat-label">Latest entry</span><span class="stat-val" id="statLatest">—</span></div>
    </div>

    <div class="sidebar-block">
      <div class="sidebar-heading">Coverage by sector</div>
      <div id="catBreakdown"></div>
    </div>

    <div class="sidebar-block">
      <div class="sidebar-heading">Recent additions</div>
      <div id="recentList"></div>
    </div>
  </aside>
</div>

<!-- DETAIL VIEW -->
<div class="detail-view" id="detailView">
  <div class="detail-topbar">
    <button class="detail-back" onclick="closeDetail()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 3L5 8l5 5"/>
      </svg>
      Back to journal
    </button>
    <div class="detail-breadcrumb">
      <span>Journal</span>
      <span class="crumb-sep">/</span>
      <span class="crumb-title" id="detailCrumb">—</span>
    </div>
    <div class="detail-topbar-right">
      <a class="detail-ext-btn" id="detailExtBtn" href="#" target="_blank">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 3H3v10h10v-3M9 3h4v4M13 3L7 9"/>
        </svg>
        Open full page
      </a>
      <button class="detail-ext-btn" id="detailEditBtn" onclick="editFromDetail()">Edit entry</button>
    </div>
  </div>
  <div class="detail-meta-strip" id="detailMetaStrip"></div>
  <div class="detail-frame-wrap" id="detailFrameWrap"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitleText">NEW RESEARCH ENTRY</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Entry title *</label>
          <input class="form-input" id="fTitle" placeholder="e.g. Global Interest Rates & PE">
        </div>
        <div class="form-group">
          <label class="form-label">Category *</label>
          <select class="form-select" id="fCategory"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="fDesc" placeholder="Brief summary of what this analysis covers..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">HTML file link (URL or filename)</label>
          <input class="form-input" id="fLink" placeholder="e.g. global_interest_rates_pe_impact.html">
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-input" type="date" id="fDate">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Tags (press Enter to add)</label>
        <div class="tag-input-wrap" id="tagWrap">
          <input class="tag-input" id="tagInput" placeholder="add tag…" onkeydown="handleTagInput(event)">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="btn-save" onclick="saveEntry()">SAVE ENTRY</button>
    </div>
  </div>
</div>

<script>
/* ── DATA ── */
const CATEGORIES = [
  { id: 'pm',  label: 'Private Markets',        color: '#326633', cls: 'cat-macro' },
  { id: 'pe',     label: 'Private Equity',      color: '#ff6600', cls: 'cat-pe' },
  { id: 'vc',     label: 'Venture Capital',      color: '#ff4499', cls: 'cat-vc' },
  { id: 'credit', label: 'Private Credit',       color: '#00d084', cls: 'cat-credit' },
  { id: 'debt',   label: 'Leveraged Finance',    color: '#ff9933', cls: 'cat-debt' },
  { id: 're',     label: 'Real Estate',          color: '#9966ff', cls: 'cat-re' },
  { id: 'infra',  label: 'Infrastructure',       color: '#ffcc00', cls: 'cat-infra' },
  { id: 'hedge',  label: 'Hedge Funds',          color: '#00cccc', cls: 'cat-hedge' },
  { id: 'macro',  label: 'Macro & Rates',        color: '#4499ff', cls: 'cat-macro' },
  { id: 'CS',  label: 'Company Deep Dives',        color: '#B6B0FF', cls: 'cat-macro' },
  { id: 'News',  label: 'PM News',        color: '#ff8fe9', cls: 'cat-macro' },
];

const TICKER_DATA = [
  { sym: 'PE DEAL VOL', val: '$1.1T', chg: '+8.2% YTD' },
  { sym: 'DRY POWDER', val: '$3.7T', chg: '+4.1% QoQ' },
  { sym: 'FED RATE', val: '3.75%', chg: '-0.50% cycle' },
  { sym: 'ECB RATE', val: '2.15%', chg: '-2.35% cycle' },
  { sym: 'BOE RATE', val: '4.25%', chg: '-0.25% cycle' },
  { sym: 'EUR IG SPREAD', val: '112bps', chg: '+3bps' },
  { sym: 'US HY SPREAD', val: '318bps', chg: '-12bps' },
  { sym: 'GLOBAL M&A', val: '$2.4T', chg: '+14% YTD' },
  { sym: 'MSCI WORLD', val: '3,241', chg: '+6.1% YTD' },
  { sym: 'BRENT CRUDE', val: '$74.2', chg: '-1.2%' },
  { sym: 'GOLD', val: '$2,914', chg: '+11.4% YTD' },
  { sym: 'USD/EUR', val: '1.0842', chg: '+0.3%' },
];

let entries = [];
let activeCat = 'all';
let sortMode = 'date';
let editTags = [];
let editingId = null;
let isAdmin = false;
const ADMIN_PASSWORD = "Swimmingboy@7oaks";

/* ── STORAGE ── */
function load() {
  try {
    const d = localStorage.getItem('pmj_entries');
    entries = d ? JSON.parse(d) : [];
    if (!entries.length) seedDefaults();
  } catch(e) { entries = []; seedDefaults(); }
}
function save() {
  try { localStorage.setItem('pmj_entries', JSON.stringify(entries)); } catch(e) {}
}
function seedDefaults() {
  entries = [
    {
      id: 'seed1',
      title: 'Global Interest Rates & Private Equity Impact',
      category: 'macro',
      desc: 'Historic analysis of Fed, ECB, and BoE rates 2000–2026 with PE commentary by era. Covers ZIRP, the 2022 rate shock, and recovery cycle.',
      link: 'global_interest_rates_pe_impact.html',
      date: new Date().toISOString().split('T')[0],
      tags: ['interest rates', 'PE', 'central banks', 'LBO', 'ZIRP'],
    },
  ];
  save();
}

/* ── TICKER ── */
function buildTicker() {
  const data = [...TICKER_DATA, ...TICKER_DATA];
  const html = data.map(t =>
    `<span class="ticker-item">${t.sym} <strong>${t.val}</strong> <span class="change">${t.chg}</span></span>`
  ).join('');
  document.getElementById('tickerScroll').innerHTML = html;
}

/* ── CLOCK ── */
function updateClock() {
  const now = new Date();
  const h = String(now.getUTCHours()).padStart(2,'0');
  const m = String(now.getUTCMinutes()).padStart(2,'0');
  const s = String(now.getUTCSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s} GMT`;
}

/* ── NAV ── */
function buildNav() {
  const nav = document.getElementById('mainNav');
  const allCount = entries.length;
  let html = `<div class="nav-item ${activeCat==='all'?'active':''}" onclick="setCategory('all')">All<span class="nav-count">${allCount}</span></div>`;
  CATEGORIES.forEach(c => {
    const n = entries.filter(e => e.category === c.id).length;
    html += `<div class="nav-item ${activeCat===c.id?'active':''}" onclick="setCategory('${c.id}')">${c.label}<span class="nav-count">${n}</span></div>`;
  });
  nav.innerHTML = html;
}

/* ── CARDS ── */
function buildCards() {
  const grid = document.getElementById('cardGrid');
  let filtered = activeCat === 'all' ? [...entries] : entries.filter(e => e.category === activeCat);
  if (sortMode === 'date') filtered.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  if (sortMode === 'alpha') filtered.sort((a,b) => a.title.localeCompare(b.title));
  if (sortMode === 'cat') filtered.sort((a,b) => a.category.localeCompare(b.category));

  const label = activeCat === 'all' ? 'ALL SECTORS' : (CATEGORIES.find(c=>c.id===activeCat)||{}).label?.toUpperCase() || 'ALL';
  document.getElementById('feedLabel').textContent = label;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-title">No entries yet</div>
      <div class="empty-sub">Click "+ ADD ENTRY" to log your first research file in this category.</div>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(e => {
    const cat = CATEGORIES.find(c => c.id === e.category) || CATEGORIES[0];
    const dateStr = e.date ? new Date(e.date + 'T12:00:00').toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}) : '';
    const tags = (e.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
    return `<div class="card ${cat.cls}" style="--card-accent:${cat.color}" id="card-${e.id}" onclick="openDetail('${e.id}')">
      <div class="card-meta">
        <span class="card-category" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44;">${cat.label}</span>
        <span class="card-date">${dateStr}</span>
      </div>
      <div class="card-title">${e.title}</div>
      ${e.desc ? `<div class="card-desc">${e.desc}</div>` : ''}
      <div class="card-tags">${tags}</div>
      <div class="card-footer" style="margin-top:0.75rem">
        <span class="card-open" style="pointer-events:none;opacity:0.7">VIEW ENTRY →</span>
        <div class="card-actions">
          <button class="btn-sm" onclick="editEntry('${e.id}',event)">EDIT</button>
          <button class="btn-sm danger" onclick="deleteEntry('${e.id}',event)">DEL</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── SIDEBAR ── */
function buildSidebar() {
  const total = entries.length;
  const cats = new Set(entries.map(e=>e.category)).size;
  const latest = entries.length ? entries.reduce((a,b)=>(a.date>b.date?a:b)) : null;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCats').textContent = cats;
  document.getElementById('statLatest').textContent = latest
    ? new Date(latest.date+'T12:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short'})
    : '—';

  const breakdown = document.getElementById('catBreakdown');
  const sorted = [...CATEGORIES].filter(c => entries.some(e=>e.category===c.id))
    .sort((a,b) => entries.filter(e=>e.category===b.id).length - entries.filter(e=>e.category===a.id).length);
  breakdown.innerHTML = sorted.map(c => {
    const n = entries.filter(e=>e.category===c.id).length;
    const pct = total ? Math.round((n/total)*100) : 0;
    return `<div class="cat-row" onclick="setCategory('${c.id}')">
      <div class="cat-dot" style="background:${c.color}"></div>
      <div class="cat-name">${c.label}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:${c.color}"></div></div>
      <div class="cat-n">${n}</div>
    </div>`;
  }).join('') || '<div style="color:var(--white-muted);font-size:12px;padding:8px 0;">No entries yet.</div>';

  const recent = [...entries].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,5);
  document.getElementById('recentList').innerHTML = recent.map(e => {
    const cat = CATEGORIES.find(c=>c.id===e.category)||CATEGORIES[0];
    return `<div class="recent-item" onclick="scrollToCard('${e.id}')">
      <div class="recent-title">${e.title}</div>
      <div class="recent-meta" style="color:${cat.color}">${cat.label} · ${e.date||''}</div>
    </div>`;
  }).join('') || '<div style="color:var(--white-muted);font-size:12px;padding:8px 0;">No entries yet.</div>';
}

/* ── CATEGORY SELECT ── */
function populateCategorySelect() {
  const sel = document.getElementById('fCategory');
  sel.innerHTML = CATEGORIES.map(c => `<option value="${c.id}">${c.label}</option>`).join('');
}

/* PASSWORD SETUP */
function requireAdmin() {
  if (isAdmin) return true;

  const input = prompt("Enter admin password to modify entries:");
  if (input === ADMIN_PASSWORD) {
    isAdmin = true;
    alert("Admin mode unlocked.");
    return true;
  }

  alert("Incorrect password.");
  return false;
}

function adminOnly(action) {
  if (!requireAdmin()) return false;
  return true;
}
/* ── MODAL ── */
function openModal(prefillCat) {
  editingId = null;
  editTags = [];
  document.getElementById('editId').value = '';
  document.getElementById('fTitle').value = '';
  document.getElementById('fCategory').value = prefillCat || (activeCat !== 'all' ? activeCat : 'pe');
  document.getElementById('fDesc').value = '';
  document.getElementById('fLink').value = '';
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('modalTitleText').textContent = 'NEW RESEARCH ENTRY';
  renderTagPills();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 100);
}
function openProtectedModal(prefillCat) {
  if (!adminOnly()) return;
  openModal(prefillCat);
}
function editEntry(id, e) {
  e.stopPropagation();
  if (!adminOnly()) return;
  const entry = entries.find(x=>x.id===id);
  if (!entry) return;
  editingId = id;
  editTags = [...(entry.tags||[])];
  document.getElementById('editId').value = id;
  document.getElementById('fTitle').value = entry.title;
  document.getElementById('fCategory').value = entry.category;
  document.getElementById('fDesc').value = entry.desc||'';
  document.getElementById('fLink').value = entry.link||'';
  document.getElementById('fDate').value = entry.date||'';
  document.getElementById('modalTitleText').textContent = 'EDIT ENTRY';
  renderTagPills();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
function saveEntry() {
  const title = document.getElementById('fTitle').value.trim();
  const category = document.getElementById('fCategory').value;
  if (!title) { document.getElementById('fTitle').focus(); return; }
  if (editingId) {
    const idx = entries.findIndex(e=>e.id===editingId);
    if (idx > -1) {
      entries[idx] = {
        ...entries[idx],
        title, category,
        desc: document.getElementById('fDesc').value.trim(),
        link: document.getElementById('fLink').value.trim(),
        date: document.getElementById('fDate').value,
        tags: [...editTags]
      };
    }
  } else {
    entries.unshift({
      id: 'e' + Date.now(),
      title, category,
      desc: document.getElementById('fDesc').value.trim(),
      link: document.getElementById('fLink').value.trim(),
      date: document.getElementById('fDate').value,
      tags: [...editTags]
    });
  }
  save();
  closeModal();
  render();
  if (!editingId) {
    setTimeout(() => {
      const first = document.querySelector('.card');
      if (first) first.classList.add('flash');
    }, 50);
  }
}
function deleteEntry(id, e) {
  e.stopPropagation();
  if (!adminOnly()) return;
  if (!confirm('Remove this entry?')) return;
  entries = entries.filter(x=>x.id!==id);
  save();
  render();
}

/* ── TAGS ── */
function handleTagInput(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,$/, '');
    if (val && !editTags.includes(val)) { editTags.push(val); renderTagPills(); }
    e.target.value = '';
  }
  if (e.key === 'Backspace' && !e.target.value && editTags.length) {
    editTags.pop(); renderTagPills();
  }
}
function removeTag(t) {
  editTags = editTags.filter(x=>x!==t);
  renderTagPills();
}
function renderTagPills() {
  const wrap = document.getElementById('tagWrap');
  const inp = document.getElementById('tagInput');
  wrap.innerHTML = '';
  editTags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag-pill';
    span.innerHTML = `${t}<button onclick="removeTag('${t}')">×</button>`;
    wrap.appendChild(span);
  });
  wrap.appendChild(inp);
  inp.focus();
}

/* ── SORT / FILTER ── */
function setCategory(id) {
  activeCat = id;
  render();
}
function setSort(mode, el) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  buildCards();
}
function scrollToCard(id) {
  const el = document.getElementById('card-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

/* ── DETAIL VIEW ── */
let currentDetailId = null;

function openDetail(id) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  currentDetailId = id;

  const cat = CATEGORIES.find(c => c.id === entry.category) || CATEGORIES[0];
  const dateStr = entry.date
    ? new Date(entry.date + 'T12:00:00').toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'})
    : '—';

  // breadcrumb
  document.getElementById('detailCrumb').textContent = entry.title;

  // external link button
  const extBtn = document.getElementById('detailExtBtn');
  if (entry.link) {
    extBtn.href = entry.link;
    extBtn.style.display = 'flex';
  } else {
    extBtn.style.display = 'none';
  }

  // meta strip
  const tags = (entry.tags || []).map(t => `<span class="meta-chip"><strong>${t}</strong></span>`).join('');
  document.getElementById('detailMetaStrip').innerHTML = `
    <span class="meta-chip">
      <span class="cat-badge" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44;">${cat.label}</span>
    </span>
    <span class="meta-chip">Date <strong>${dateStr}</strong></span>
    ${entry.link ? `<span class="meta-chip">File <strong>${entry.link}</strong></span>` : ''}
    ${tags}
  `;

  // frame content
  const wrap = document.getElementById('detailFrameWrap');
  if (entry.link) {
    wrap.innerHTML = `<iframe class="detail-iframe" src="${entry.link}" title="${entry.title}"></iframe>`;
  } else {
    wrap.innerHTML = `
      <div class="detail-no-link">
        <div class="icon">◈</div>
        <h3>${entry.title}</h3>
        <p>${entry.desc || 'No description provided.'}</p>
        <p style="margin-top:0.5rem;color:var(--white-muted);font-size:12px;">No HTML file linked to this entry yet. Edit the entry to attach a file.</p>
        <button class="btn-add-link" onclick="closeDetail(); editEntry('${id}', {stopPropagation:()=>{}})">+ Link a file</button>
      </div>`;
  }

  document.getElementById('detailView').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('open');
  document.body.style.overflow = '';
  // clear iframe to stop any running scripts/audio
  document.getElementById('detailFrameWrap').innerHTML = '';
  currentDetailId = null;
}

function editFromDetail() {
  if (!currentDetailId) return;
  if (!adminOnly()) return;
  closeDetail();
  const fakeEvt = { stopPropagation: () => {} };
  editEntry(currentDetailId, fakeEvt);
}

// ESC key closes detail or modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('detailView').classList.contains('open')) closeDetail();
    else closeModal();
  }
});

/* ── RENDER ── */
function render() {
  buildNav();
  buildCards();
  buildSidebar();
}

/* ── INIT ── */
load();
buildTicker();
populateCategorySelect();
render();
setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
